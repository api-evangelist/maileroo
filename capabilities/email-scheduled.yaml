naftiko: 1.0.0-alpha2
info:
  label: Maileroo Email API — Scheduled
  description: 'Maileroo Email API — Scheduled. 2 operations. Lead operation: List scheduled emails. Self-contained Naftiko
    capability covering one Maileroo business surface.'
  tags:
  - Maileroo
  - Scheduled
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILEROO_API_KEY: MAILEROO_API_KEY
capability:
  consumes:
  - type: http
    namespace: email-scheduled
    baseUri: https://smtp.maileroo.com/api/v2
    description: Maileroo Email API — Scheduled business capability. Self-contained, no shared references.
    resources:
    - name: emails-scheduled
      path: /emails/scheduled
      operations:
      - name: listscheduledemails
        method: GET
        description: List scheduled emails
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: query
          type: string
          description: Sender domain (required for app-scoped API keys)
        - name: page
          in: query
          type: integer
        - name: per_page
          in: query
          type: integer
    - name: emails-scheduled-reference_id
      path: /emails/scheduled/{reference_id}
      operations:
      - name: deletescheduledemail
        method: DELETE
        description: Delete a scheduled email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: reference_id
          in: path
          type: string
          description: The 24-character hex reference ID of the scheduled email
          required: true
    authentication:
      type: bearer
      token: '{{env.MAILEROO_API_KEY}}'
  exposes:
  - type: rest
    namespace: email-scheduled-rest
    port: 8080
    description: REST adapter for Maileroo Email API — Scheduled. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/emails/scheduled
      name: emails-scheduled
      description: REST surface for emails-scheduled.
      operations:
      - method: GET
        name: listscheduledemails
        description: List scheduled emails
        call: email-scheduled.listscheduledemails
        with:
          domain: rest.domain
          page: rest.page
          per_page: rest.per_page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/emails/scheduled/{reference-id}
      name: emails-scheduled-reference-id
      description: REST surface for emails-scheduled-reference_id.
      operations:
      - method: DELETE
        name: deletescheduledemail
        description: Delete a scheduled email
        call: email-scheduled.deletescheduledemail
        with:
          reference_id: rest.reference_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: email-scheduled-mcp
    port: 9090
    transport: http
    description: MCP adapter for Maileroo Email API — Scheduled. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-scheduled-emails
      description: List scheduled emails
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: email-scheduled.listscheduledemails
      with:
        domain: tools.domain
        page: tools.page
        per_page: tools.per_page
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-scheduled-email
      description: Delete a scheduled email
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: email-scheduled.deletescheduledemail
      with:
        reference_id: tools.reference_id
      outputParameters:
      - type: object
        mapping: $.
